<!DOCTYPE html>
<html>
<head>
  <title>NurseCase | NUR 113</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<header>
  <h1>🩺 NurseCase</h1>
  <p>Clinical Judgment Simulator for NUR 113</p>
</header>

<div class="container">

  <div class="card" id="home">
    <h2>Choose Study Mode</h2>
    <p><strong>Study Mode:</strong> shows feedback after each question.</p>
    <p><strong>Quiz Mode:</strong> saves rationales until the end and gives a score.</p>

    <button onclick="startQuiz('study')">Study Mode</button>
    <button onclick="startQuiz('quiz')">Quiz Mode</button>
  </div>

  <div class="card" id="quiz" style="display:none;">
    <p id="progress"></p>
    <p id="caseInfo"></p>
    <h2 id="question"></h2>
    <div id="choices"></div>

    <div id="feedback" style="display:none;"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit</button>
    <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Next</button>
  </div>

  <div class="card" id="result" style="display:none;">
    <h2>Quiz Complete</h2>
    <p id="score"></p>
    <div id="review"></div>
    <button onclick="location.reload()">Start Over</button>
  </div>

</div>

<script src="questions.js?v=2"></script>
<script>
let currentQuestion = 0;
let score = 0;
let userAnswers = [];
let mode = "study";

function startQuiz(selectedMode) {
  mode = selectedMode;
  currentQuestion = 0;
  score = 0;
  userAnswers = [];

  document.getElementById("home").style.display = "none";
  document.getElementById("quiz").style.display = "block";

  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];

  document.getElementById("progress").innerText =
    `Question ${currentQuestion + 1} of ${questions.length}`;

  document.getElementById("caseInfo").innerText =
    `${q.caseId} • ${q.patient} • ${q.topic} • ${q.style}`;

  document.getElementById("question").innerText = q.question;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  q.choices.forEach(choice => {
    choicesDiv.innerHTML += `
      <label>
        <input type="radio" name="answer" value="${choice}">
        ${choice}
      </label>
    `;
  });

  document.getElementById("feedback").style.display = "none";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("submitBtn").style.display = "inline-block";
  document.getElementById("nextBtn").style.display = "none";
}

function submitAnswer() {
  const selected = document.querySelector('input[name="answer"]:checked');

  if (!selected) {
    alert("Choose an answer first.");
    return;
  }

  const q = questions[currentQuestion];
  const correct = selected.value === q.answer;

  userAnswers[currentQuestion] = selected.value;

  if (correct) {
    score++;
  }

  if (mode === "study") {
    const feedback = document.getElementById("feedback");
    feedback.style.display = "block";
    feedback.innerHTML = `
      <h3>${correct ? "✅ Correct" : "❌ Not quite"}</h3>
      <p><strong>Correct answer:</strong> ${q.answer}</p>
      <p><strong>Rationale:</strong> ${q.rationale}</p>
    `;
    document.getElementById("submitBtn").style.display = "none";
    document.getElementById("nextBtn").style.display = "inline-block";
  } else {
    nextQuestion();
  }
}

function nextQuestion() {
  currentQuestion++;

  if (currentQuestion < questions.length) {
    showQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("result").style.display = "block";

  const percent = Math.round((score / questions.length) * 100);

  document.getElementById("score").innerText =
    `You scored ${score} out of ${questions.length} (${percent}%).`;

  const reviewDiv = document.getElementById("review");
  reviewDiv.innerHTML = "";

  questions.forEach((q, index) => {
    const correct = userAnswers[index] === q.answer;
    reviewDiv.innerHTML += `
      <hr>
      <h3>${correct ? "✅" : "❌"} Question ${index + 1}</h3>
      <p><strong>${q.caseId} • ${q.patient}</strong></p>
      <p>${q.question}</p>
      <p><strong>Your answer:</strong> ${userAnswers[index]}</p>
      <p><strong>Correct answer:</strong> ${q.answer}</p>
      <p><strong>Rationale:</strong> ${q.rationale}</p>
    `;
  });
}
</script> 

</body>
</html>
